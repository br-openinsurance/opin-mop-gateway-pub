openapi: 3.0.3
info:
  title: "MOP Client Gateway API"
  version: "1.0.0"
  description: |
    API do MOP Client Gateway. Recebe requisições HTTP com payload JSON opcional,
    processa no mesmo serviço e envia o resultado ao servidor MOP (HTTP POST).
    Em indisponibilidade do MOP, o payload pode ser enfileirado numa fila RabbitMQ de retry
    (resiliência); o cliente pode receber HTTP 200 com a mesma mensagem de sucesso — ver documentação do projeto.
  
  contact:
    name: MOP Team
    email: mop-team@opinbrasil.com.br

servers:
  - url: "http://localhost:8080/v1/anonymize"
    description: "Servidor local (inclui server.servlet.context-path)"
  - url: "https://api-dev.intranet.opinbrasil"
    description: "Development environment"
  - url: "https://api.intranet.opinbrasil"
    description: "Production environment"

paths:
  /data:
    post:
      tags:
        - "Anonymization"
      summary: "Submit data for anonymization"
      description: |
        Recebe JSON opcional. Headers obrigatórios: X-Correlation-Id, origin ("client" ou "server"),
        path, operation, step, dataEventoStep, clientSSId, serverASId. Opcionais: destination, traceOrigin.
        Processamento síncrono no gateway; envio ao MOP ou enfileiramento em retry conforme resiliência.
      operationId: "submitAnonymizationRequest"
      
      parameters:
        - $ref: '#/components/parameters/correlationIdHeader'
        - $ref: '#/components/parameters/originHeader'
        - $ref: '#/components/parameters/pathHeader'
        - $ref: '#/components/parameters/operationHeader'
        - $ref: '#/components/parameters/stepHeader'
        - $ref: '#/components/parameters/dataEventoStepHeader'
        - $ref: '#/components/parameters/destinationHeader'
        - $ref: '#/components/parameters/traceOriginHeader'
        - $ref: '#/components/parameters/clientSSIdHeader'
        - $ref: '#/components/parameters/serverASIdHeader'
      
      requestBody:
        required: false
        description: |
          JSON payload to be anonymized (optional). The structure is flexible and can contain
          any valid JSON object. Empty, null, or invalid JSON payloads are treated as empty object ({}).
          O corpo é processado pelo fluxo interno antes do envio ao servidor MOP.
        content:
          application/json:
            schema:
              type: object
              description: "Arbitrary JSON payload"
              additionalProperties: true
            examples:
              example1:
                summary: "Simple payload example"
                value:
                  id: "12345"
                  name: "John Doe"
                  email: "john.doe@example.com"
                  timestamp: "2025-01-15T10:30:00Z"
              example2:
                summary: "Complex nested payload"
                value:
                  requestId: "req-abc-123"
                  metadata:
                    source: "external-system"
                    version: "1.0"
                  data:
                    user:
                      id: "user-123"
                      profile:
                        name: "Jane Smith"
                        preferences: ["pref1", "pref2"]
              example3:
                summary: "Empty body (optional)"
                value: {}
              example4:
                summary: "Null body (optional)"
                value: null
      
      responses:
        '200':
          description: "Processamento aceito; payload encaminhado ao MOP ou enfileirado para retry (mesmo corpo de sucesso possível)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  summary: "Successful response with all fields"
                  value:
                    status: "SUCCESS"
                    message: "Request processed successfully. Your data has been received and forwarded to the server."
                    correlationId: "corr-local-001"
                    timestamp: "2024-01-15T14:30:25.123Z"
                    clientSSId: "RECEPTORA A"
                    serverASId: "TRANSMISSORA B"
                    path: "/open-insurance/consents/v2/consents"
                    operation: "POST"
        
        '400':
          description: "Bad Request - Invalid headers or JSON payload"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidHeader:
                  summary: "Missing or empty header"
                  value:
                    status: "ERROR"
                    error: "Invalid header"
                    details: "Header 'origin' must not be empty"
                    timestamp: "2024-01-15T14:30:25.123Z"
                invalidOrigin:
                  summary: "Invalid origin value (must be client or server)"
                  value:
                    status: "ERROR"
                    error: "Invalid header"
                    details: "Header 'origin' must be either 'client' or 'server'"
                    timestamp: "2024-01-15T14:30:25.123Z"
                jsonConversionError:
                  summary: "JSON conversion error"
                  value:
                    status: "ERROR"
                    error: "JSON conversion error"
                    details: "Failed to process JSON payload: ..."
                    timestamp: "2024-01-15T14:30:25.123Z"
        
        '500':
          description: "Erro interno — falha no processamento ou na infraestrutura"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unexpectedError:
                  summary: "Unexpected error"
                  value:
                    status: "ERROR"
                    error: "Unexpected error"
                    details: "An unexpected error occurred while processing the request"
                    timestamp: "2024-01-15T14:30:25.123Z"

components:
  parameters:
    correlationIdHeader:
      name: "X-Correlation-Id"
      in: "header"
      description: "Identificador de correlação obrigatório (informado pelo cliente)."
      required: true
      schema:
        type: string
        minLength: 1
        example: "corr-2026-001"

    originHeader:
      name: "origin"
      in: "header"
      description: |
        Origem da requisição: "client" ou "server".
      required: true
      schema:
        type: string
        enum: ["client", "server"]
        example: "client"
    
    destinationHeader:
      name: "destination"
      in: "header"
      description: |
        Target system identifier (optional). Identifies the intended recipient or logical destination
        for the message. When provided via header, used for serverASId fallback and trace.
      required: false
      schema:
        type: string
        example: "anonymization-service"
    
    pathHeader:
      name: "path"
      in: "header"
      description: |
        Logical path or endpoint identifier. Represents the business route or endpoint
        related to the message processing.
      required: true
      schema:
        type: string
        minLength: 1
        example: "/open-insurance/consents/v2/consents"
    
    operationHeader:
      name: "operation"
      in: "header"
      description: |
        Método HTTP da operação (ex.: GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS, TRACE).
      required: true
      schema:
        type: string
        minLength: 1
        enum: ["GET", "POST", "PUT", "PATCH", "DELETE", "HEAD", "OPTIONS", "TRACE"]
        example: "POST"
    
    
    clientSSIdHeader:
      name: "clientSSId"
      in: "header"
      description: |
        Client SS identifier (receiver). Required.
      required: true
      schema:
        type: string
        minLength: 1
        example: "RECEIVER A"
    
    serverASIdHeader:
      name: "serverASId"
      in: "header"
      description: |
        Server AS identifier (transmitter). Required.
      required: true
      schema:
        type: string
        minLength: 1
        example: "TRANSMITTER B"

    stepHeader:
      name: "step"
      in: "header"
      description: |
        Step of the flow in the trace (e.g. consent-created, consent-read). Required.
        Reflected in the message trace.
      required: true
      schema:
        type: string
        minLength: 1
        example: "consent-created"

    dataEventoStepHeader:
      name: "dataEventoStep"
      in: "header"
      description: |
        Timestamp of the step event in the trace (ISO-8601). Required.
        Reflected in the message trace.
      required: true
      schema:
        type: string
        format: date-time
        minLength: 1
        example: "2026-02-23T18:44:29.650942812Z"

    traceOriginHeader:
      name: "traceOrigin"
      in: "header"
      description: |
        Origin of the event in the trace (e.g. CLIENT, SERVER). Optional.
        When provided, it is reflected in the message trace. If not provided, CLIENT is used.
      required: false
      schema:
        type: string
        example: "CLIENT"

  schemas:
    SuccessResponse:
      type: object
      description: |
        Resposta de sucesso. O correlationId corresponde ao header X-Correlation-Id.
      properties:
        status:
          type: string
          description: "Response status, always 'SUCCESS' for successful requests"
          enum: ["SUCCESS"]
          example: "SUCCESS"
        message:
          type: string
          description: "Human-readable success message"
          example: "Request processed successfully. Your data has been received and forwarded to the server."
        correlationId:
          type: string
          description: "Identificador de correlação (header X-Correlation-Id)"
          example: "corr-2026-001"
        timestamp:
          type: string
          format: date-time
          description: "Timestamp when the request was processed (ISO-8601 format)"
          example: "2024-01-15T14:30:25.123Z"
        clientSSId:
          type: string
          description: "Identificador clientSSId (receptora)"
          example: "RECEPTORA A"
        serverASId:
          type: string
          description: "Identificador serverASId (transmissora)"
          example: "TRANSMISSORA B"
        path:
          type: string
          description: "Path identifier from request header"
          example: "/open-insurance/consents/v2/consents"
        operation:
          type: string
          description: "Operation type from request header"
          example: "POST"
      required:
        - status
        - message
        - correlationId
        - timestamp
        - clientSSId
        - serverASId
        - path
        - operation
    
    ErrorResponse:
      type: object
      description: |
        Error API response with structured fields. Contains error information
        and timestamp for debugging purposes.
      properties:
        status:
          type: string
          description: "Response status, always 'ERROR' for error responses"
          enum: ["ERROR"]
          example: "ERROR"
        error:
          type: string
          description: "Error type or category"
          example: "Invalid header"
        details:
          type: string
          description: "Detailed error message explaining what went wrong"
          example: "Header 'origin' must not be empty"
        timestamp:
          type: string
          format: date-time
          description: "Timestamp when the error occurred (ISO-8601 format)"
          example: "2024-01-15T14:30:25.123Z"
      required:
        - status
        - error
        - details
        - timestamp

  securitySchemes:
    # Note: Currently no authentication is required, but this can be extended
    # with API keys, OAuth2, or other authentication mechanisms
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "API Key for authentication (future implementation)"

tags:
  - name: "Anonymization"
    description: "Operations for submitting data anonymization requests"

