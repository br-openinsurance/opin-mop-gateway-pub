openapi: 3.0.3
info:
  title: "MOP Client Gateway API"
  version: "1.0.0"
  description: |
    API Gateway for MOP (Message Oriented Processing) Client Gateway.
    This service receives anonymization requests, validates headers and payload,
    and forwards messages to RabbitMQ queues for processing.
  
  contact:
    name: MOP Team
    email: mop-team@opinbrasil.com.br

servers:
  - url: "http://localhost:8080"
    description: "Local development server"
  - url: "https://api-dev.intranet.opinbrasil"
    description: "Development environment"
  - url: "https://api.intranet.opinbrasil"
    description: "Production environment"

paths:
  /data:
    post:
      tags:
        - "Anonymization"
      summary: "Submit data for anonymization"
      description: |
        Receives a JSON payload (optional) and forwards it to the anonymization processing queue.
        The request must include required headers for routing and traceability.
        Empty, null, or invalid JSON payloads are treated as empty object ({}).
        The correlationID and timestamp are automatically generated if not provided in headers.
        The payload is validated and sent to RabbitMQ for asynchronous processing.
      operationId: "submitAnonymizationRequest"
      
      parameters:
        - $ref: '#/components/parameters/originHeader'
        - $ref: '#/components/parameters/destinationHeader'
        - $ref: '#/components/parameters/pathHeader'
        - $ref: '#/components/parameters/operationHeader'
        - $ref: '#/components/parameters/userIdHeader'
        - $ref: '#/components/parameters/applicationModeHeader'
        - $ref: '#/components/parameters/correlationIdHeader'
      
      requestBody:
        required: false
        description: |
          JSON payload to be anonymized (optional). The structure is flexible and can contain
          any valid JSON object. Empty, null, or invalid JSON payloads are treated as empty object ({}).
          The payload will be forwarded as-is to the processing queue.
        content:
          application/json:
            schema:
              type: object
              description: "Arbitrary JSON payload"
              additionalProperties: true
            examples:
              example1:
                summary: "Simple payload example"
                value:
                  id: "12345"
                  name: "John Doe"
                  email: "john.doe@example.com"
                  timestamp: "2025-01-15T10:30:00Z"
              example2:
                summary: "Complex nested payload"
                value:
                  requestId: "req-abc-123"
                  metadata:
                    source: "external-system"
                    version: "1.0"
                  data:
                    user:
                      id: "user-123"
                      profile:
                        name: "Jane Smith"
                        preferences: ["pref1", "pref2"]
              example3:
                summary: "Empty body (optional)"
                value: {}
              example4:
                summary: "Null body (optional)"
                value: null
      
      responses:
        '200':
          description: "Message sent successfully to the processing queue"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  summary: "Successful response with all fields"
                  value:
                    status: "SUCCESS"
                    message: "Request processed successfully. Your data has been received and forwarded to the queue."
                    correlationId: "mop-gateway-20240115-143025-123-abc12345"
                    timestamp: "2024-01-15T14:30:25.123Z"
                    origin: "external-api-service"
                    destination: "anonymization-service"
                    path: "/open-insurance/consents/v2/consents"
                    operation: "POST"
                    applicationMode: "TRANSMITTER"
        
        '400':
          description: "Bad Request - Invalid headers or JSON payload"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidHeader:
                  summary: "Missing or empty header"
                  value:
                    status: "ERROR"
                    error: "Invalid header"
                    details: "Header 'origin' must not be empty"
                    timestamp: "2024-01-15T14:30:25.123Z"
                invalidApplicationMode:
                  summary: "Invalid applicationMode value"
                  value:
                    status: "ERROR"
                    error: "Invalid header"
                    details: "Header 'applicationMode' must be either 'TRANSMITTER' or 'RECEIVER'"
                    timestamp: "2024-01-15T14:30:25.123Z"
                jsonConversionError:
                  summary: "JSON conversion error"
                  value:
                    status: "ERROR"
                    error: "JSON conversion error"
                    details: "Failed to process JSON payload: ..."
                    timestamp: "2024-01-15T14:30:25.123Z"
        
        '500':
          description: "Internal Server Error - Processing or messaging failure"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rabbitmqError:
                  summary: "RabbitMQ processing error"
                  value:
                    status: "ERROR"
                    error: "Message processing error"
                    details: "Failed to process message: Connection timeout"
                    timestamp: "2024-01-15T14:30:25.123Z"
                unexpectedError:
                  summary: "Unexpected error"
                  value:
                    status: "ERROR"
                    error: "Unexpected error"
                    details: "An unexpected error occurred while processing the request"
                    timestamp: "2024-01-15T14:30:25.123Z"

components:
  parameters:
    originHeader:
      name: "origin"
      in: "header"
      description: |
        Source system identifier. Identifies the system or service that originated the request.
        This value is used for routing and traceability in the message queue.
      required: true
      schema:
        type: string
        minLength: 1
        example: "external-api-service"
    
    destinationHeader:
      name: "destination"
      in: "header"
      description: |
        Target system identifier. Identifies the intended recipient or logical destination
        for the message in the processing pipeline.
      required: true
      schema:
        type: string
        minLength: 1
        example: "anonymization-service"
    
    pathHeader:
      name: "path"
      in: "header"
      description: |
        Logical path or endpoint identifier. Represents the business route or endpoint
        related to the message processing.
      required: true
      schema:
        type: string
        minLength: 1
        example: "/open-insurance/consents/v2/consents"
    
    operationHeader:
      name: "operation"
      in: "header"
      description: |
        Operation type identifier. Specifies the type of operation being performed
        (e.g., CREATE, UPDATE, DELETE, PROCESS).
      required: true
      schema:
        type: string
        minLength: 1
        enum: ["CREATE", "UPDATE", "DELETE", "PROCESS", "GET", "POST", "PUT", "PATCH"]
        example: "PROCESS"
    
    userIdHeader:
      name: "userID"
      in: "header"
      description: |
        User identifier associated with the request. Used for audit and traceability.
        Identifies the user or system account making the request.
      required: true
      schema:
        type: string
        minLength: 1
        example: "user-12345"
    
    applicationModeHeader:
      name: "applicationMode"
      in: "header"
      description: |
        Application mode identifier. Specifies the mode of operation for the gateway.
        Must be either TRANSMITTER (for sending messages) or RECEIVER (for receiving messages).
      required: true
      schema:
        type: string
        enum: ["TRANSMITTER", "RECEIVER"]
        example: "TRANSMITTER"
    
    correlationIdHeader:
      name: "CORRELATIONID"
      in: "header"
      description: |
        Correlation identifier for distributed tracing (optional).
        If not provided, a traceable correlation ID will be automatically generated
        in the format: mop-gateway-YYYYMMdd-HHmmss-SSS-XXXXXXXX
      required: false
      schema:
        type: string
        pattern: "^mop-gateway-\\d{8}-\\d{6}-\\d{3}-[a-zA-Z0-9]{8}$"
        example: "mop-gateway-20240115-143025-123-abc12345"

  schemas:
    SuccessResponse:
      type: object
      description: |
        Successful API response with structured fields containing request details
        and traceability information. All fields are automatically populated.
      properties:
        status:
          type: string
          description: "Response status, always 'SUCCESS' for successful requests"
          enum: ["SUCCESS"]
          example: "SUCCESS"
        message:
          type: string
          description: "Human-readable success message"
          example: "Request processed successfully. Your data has been received and forwarded to the queue."
        correlationId:
          type: string
          description: |
            Correlation ID for request tracking. Automatically generated if not provided in header.
            Format: mop-gateway-YYYYMMdd-HHmmss-SSS-XXXXXXXX
          example: "mop-gateway-20240115-143025-123-abc12345"
        timestamp:
          type: string
          format: date-time
          description: "Timestamp when the request was processed (ISO-8601 format)"
          example: "2024-01-15T14:30:25.123Z"
        origin:
          type: string
          description: "Origin system identifier from request header"
          example: "external-api-service"
        destination:
          type: string
          description: "Destination system identifier from request header"
          example: "anonymization-service"
        path:
          type: string
          description: "Path identifier from request header"
          example: "/open-insurance/consents/v2/consents"
        operation:
          type: string
          description: "Operation type from request header"
          example: "POST"
        applicationMode:
          type: string
          description: "Application mode from request header"
          enum: ["TRANSMITTER", "RECEIVER"]
          example: "TRANSMITTER"
      required:
        - status
        - message
        - correlationId
        - timestamp
        - origin
        - destination
        - path
        - operation
        - applicationMode
    
    ErrorResponse:
      type: object
      description: |
        Error API response with structured fields. Contains error information
        and timestamp for debugging purposes.
      properties:
        status:
          type: string
          description: "Response status, always 'ERROR' for error responses"
          enum: ["ERROR"]
          example: "ERROR"
        error:
          type: string
          description: "Error type or category"
          example: "Invalid header"
        details:
          type: string
          description: "Detailed error message explaining what went wrong"
          example: "Header 'origin' must not be empty"
        timestamp:
          type: string
          format: date-time
          description: "Timestamp when the error occurred (ISO-8601 format)"
          example: "2024-01-15T14:30:25.123Z"
      required:
        - status
        - error
        - details
        - timestamp

  securitySchemes:
    # Note: Currently no authentication is required, but this can be extended
    # with API keys, OAuth2, or other authentication mechanisms
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "API Key for authentication (future implementation)"

tags:
  - name: "Anonymization"
    description: "Operations for submitting data anonymization requests"

