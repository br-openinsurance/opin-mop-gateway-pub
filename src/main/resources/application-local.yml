spring:
  application:
    name: mop-client-gateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  rabbitmq:
    host: ${RABBITMQ_VALIDATOR_HOST}
    port: ${RABBITMQ_VALIDATOR_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

  # Cache configuration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m

# ============================================================================
# Server Configuration
# ============================================================================
server:
  port: 8080
  servlet:
    context-path: /v1/anonymize

# ============================================================================
# Cache Configuration
# ============================================================================
cache:
  max-size: ${CACHE_MAX_SIZE:10000}
  app-config:
    ttl-seconds: ${CACHE_APP_CONFIG_TTL_SECONDS:1800}
  normalized-endpoints:
    ttl-seconds: ${CACHE_NORMALIZED_ENDPOINTS_TTL_SECONDS:300}

# ============================================================================
# Spring Boot Actuator
# ============================================================================
# Endpoints ficam sob o context-path da app, ex.: .../v1/anonymize/actuator/health
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:*}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
  metrics:
    tags:
      application: ${spring.application.name}

# ============================================================================
# Logging Configuration
# ============================================================================
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    br.com.opin.mopclient.gateway: ${LOG_LEVEL_GATEWAY:DEBUG}

# MOP endpoints, client retry queue, payload signing and circuit breakers
mop:
  endpoints:
    process:
      url: ${EXTERNAL_REQUEST_URL}
      method: ${MOP_PROCESS_METHOD:POST}
    anonymization-config:
      url: ${EXTERNAL_API_DATA_ANONYMIZATION}
  payload-signing:
    enabled: ${MOP_PAYLOAD_SIGNING_ENABLED:true}
    private-key-pem: ${JWS_PRIVATE_KEY}
    key-id: ${JWS_KID}
    org-id: ${JWS_ORG_ID}
  client:
    retry:
      queue: ${MOP_CLIENT_RETRY_QUEUE:mop.client.retry.queue}
      dlq:
        queue: ${MOP_CLIENT_RETRY_DLQ_QUEUE:mop.client.retry.dlq}
        max-attempts: ${MOP_CLIENT_RETRY_DLQ_MAX_ATTEMPTS:5}
      replay:
        enabled: ${MOP_CLIENT_RETRY_REPLAY_ENABLED:true}
        initial-delay-ms: ${MOP_CLIENT_RETRY_REPLAY_INITIAL_DELAY_MS:60000}
        interval-ms: ${MOP_CLIENT_RETRY_REPLAY_INTERVAL_MS:60000}
        max-messages-per-tick: ${MOP_CLIENT_RETRY_REPLAY_MAX_PER_TICK:25}
  server:
    availability:
      enabled: ${MOP_SERVER_AVAILABILITY_CHECK_ENABLED:true}
      check-interval-ms: ${MOP_SERVER_AVAILABILITY_CHECK_INTERVAL_MS:30000}
      connect-timeout-ms: ${MOP_SERVER_AVAILABILITY_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${MOP_SERVER_AVAILABILITY_READ_TIMEOUT_MS:5000}
  rabbit:
    require-at-startup: ${MOP_RABBIT_REQUIRE_AT_STARTUP:true}

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
    instances:
      mopAnonymizationConfig:
        baseConfig: default
      mopProcessEndpoint:
        baseConfig: default
