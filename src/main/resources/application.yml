# ============================================================================
# MOP Client Gateway - Base Configuration
# ============================================================================
# This is the base configuration file. Environment-specific configurations
# (e.g., application_local.yml, application_prod.yml) can override these values.
# Properties can be overridden by environment variables.
# ============================================================================

spring:
  application:
    name: mop-client-gateway

  # Spring AMQP Configuration for RabbitMQ
  rabbitmq:
    # Connection settings
    # Environment variables: RABBITMQ_HOST, RABBITMQ_PORT, RABBITMQ_USERNAME, RABBITMQ_PASSWORD
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

    # Listener configuration
    listener:
      simple:
        # Enable automatic acknowledgment
        acknowledge-mode: auto
        # Number of concurrent consumers
        # Environment variable: RABBITMQ_CONCURRENCY
        concurrency: ${RABBITMQ_CONCURRENCY}
        # Maximum number of concurrent consumers
        # Environment variable: RABBITMQ_MAX_CONCURRENCY
        max-concurrency: ${RABBITMQ_MAX_CONCURRENCY}
        # Prefetch count - number of unacknowledged messages per consumer
        # Environment variable: RABBITMQ_PREFETCH
        prefetch: ${RABBITMQ_PREFETCH}

    # Application-specific RabbitMQ configuration
    queues:
      # Validator queue configuration (for publishing messages)
      # Environment variable: RABBITMQ_QUEUE_VALIDATOR
      validator:
        name: ${RABBITMQ_QUEUE_VALIDATOR}
      # Output queue configuration (for consuming messages)
      # Environment variable: RABBITMQ_QUEUE_OUTPUT
      output:
        name: ${RABBITMQ_QUEUE_OUTPUT}

    # Retry configuration
    # Environment variables: RABBITMQ_RETRY_MAX_ATTEMPTS, RABBITMQ_RETRY_BACKOFF
    retry:
      maxAttempts: ${RABBITMQ_RETRY_MAX_ATTEMPTS}
      backoff: ${RABBITMQ_RETRY_BACKOFF}
      enablesTransactionSupport: true

# ============================================================================
# Server Configuration
# ============================================================================
# Environment variables: SERVER_PORT, SERVER_CONTEXT_PATH
server:
  port: 8080
  servlet:
    context-path: /v1/anonymize

# ============================================================================
# External API Configuration
# ============================================================================
# Environment variable: EXTERNAL_API_URL
external:
  server:
    request:
      url: ${EXTERNAL_API_URL}

# ============================================================================
# Spring Boot Actuator Configuration
# ============================================================================
# Environment variables: MANAGEMENT_ENDPOINTS_INCLUDE, MANAGEMENT_HEALTH_SHOW_DETAILS
management:
  endpoints:
    web:
      exposure:
        # Expose all endpoints by default
        # Can be restricted via MANAGEMENT_ENDPOINTS_INCLUDE env var
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS}