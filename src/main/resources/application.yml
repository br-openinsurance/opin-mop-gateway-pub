spring:
  application:
    name: mop-client-gateway
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  rabbitmq:
    host: ${RABBITMQ_VALIDATOR_HOST}
    port: ${RABBITMQ_VALIDATOR_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

  # Cache configuration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m

# ============================================================================
# Server Configuration
# ============================================================================
server:
  port: 8080
  servlet:
    context-path: /v1/anonymize

# ============================================================================
# External API Configuration
# ============================================================================
external:
  # Base URL do MOP (evita repetição em request/api)
  host: ${EXTERNAL_HOST}
  server:
    request:
      url: ${external.request.url}
  api:
    data-anonymization: ${EXTERNAL_API_DATA_ANONYMIZATION:${external.host}/anonymization-fields?schema=Consent}
  request:
    host: ${EXTERNAL_REQUEST_HOST:${external.host}}
    path: ${EXTERNAL_REQUEST_PATH:/process}
    url: ${EXTERNAL_REQUEST_URL:${external.request.host}${external.request.path}}
    method: ${EXTERNAL_REQUEST_METHOD:POST}

# ============================================================================
# Cache Configuration
# ============================================================================
cache:
  max-size: ${CACHE_MAX_SIZE:10000}
  open-api-spec:
    ttl-seconds: ${CACHE_OPEN_API_SPEC_TTL_SECONDS:3600}
  app-config:
    ttl-seconds: ${CACHE_APP_CONFIG_TTL_SECONDS:1800}
  normalized-endpoints:
    ttl-seconds: ${CACHE_NORMALIZED_ENDPOINTS_TTL_SECONDS:300}

# ============================================================================
# Spring Boot Actuator Configuration
# ============================================================================
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:*}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
  metrics:
    tags:
      application: ${spring.application.name}

# ============================================================================
# Logging Configuration
# ============================================================================
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    br.com.opin.mopclient.gateway: ${LOG_LEVEL_GATEWAY:DEBUG}

# Client retry queue + circuit breakers (anonymization-fields + /process)
mop:
  payload-signing:
    enabled: ${MOP_PAYLOAD_SIGNING_ENABLED}
    private-key-pem: ${JWS_PRIVATE_KEY}
    key-id: ${JWS_KID}
    org-id: ${JWS_ORG_ID}
  client:
    retry:
      queue: ${MOP_CLIENT_RETRY_QUEUE:mop.client.retry.queue}
      replay:
        enabled: ${MOP_CLIENT_RETRY_REPLAY_ENABLED:true}
        initial-delay-ms: ${MOP_CLIENT_RETRY_REPLAY_INITIAL_DELAY_MS:15000}
        interval-ms: ${MOP_CLIENT_RETRY_REPLAY_INTERVAL_MS:10000}
        max-messages-per-tick: ${MOP_CLIENT_RETRY_REPLAY_MAX_PER_TICK:25}
  server:
    availability:
      enabled: ${MOP_SERVER_AVAILABILITY_CHECK_ENABLED:true}
      check-interval-ms: ${MOP_SERVER_AVAILABILITY_CHECK_INTERVAL_MS:30000}
      connect-timeout-ms: ${MOP_SERVER_AVAILABILITY_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${MOP_SERVER_AVAILABILITY_READ_TIMEOUT_MS:5000}

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
    instances:
      mopAnonymizationConfig:
        baseConfig: default
      mopProcessEndpoint:
        baseConfig: default
